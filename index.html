<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGENCE_IMMOBILIER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="nav-bar">
      <a class="brand" href="#">AGENCE_IMMOBILIER</a>
      <nav class="nav-menu">
        <a href="#">Accueil</a>
        <a href="#">Biens</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero1">
        <p class="hero2">Votre futur logement commence ici</p>
        <h1>Trouvez la maison ideale pour votre famille</h1>
        <p class="hero-text">
          Decouvrez une selection de biens immobiliers modernes, confortables et
          adaptes a vos besoins dans les villes qui vous interessent.
        </p>

        <div class="hero-search">
          <div class="search-field">
  <label for="ville">Ville</label>
  <select id="ville">
    <option value="">Choisir une région</option>
    <option value="dakar">Dakar</option>
    <option value="thies">Thiès</option>
    <option value="diourbel">Diourbel</option>
    <option value="fatick">Fatick</option>
    <option value="kaolack">Kaolack</option>
    <option value="kaffrine">Kaffrine</option>
    <option value="kolda">Kolda</option>
    <option value="kedougou">Kédougou</option>
    <option value="louga">Louga</option>
    <option value="matam">Matam</option>
    <option value="saint-louis">Saint-Louis</option>
    <option value="sedhiou">Sédhiou</option>
    <option value="tambacounda">Tambacounda</option>
    <option value="ziguinchor">Ziguinchor</option>
  </select>
</div>
          <div class="search-field">
  <label for="type">Type</label>
  <select id="type">
    <option value="">Choisir un type</option>
    <option value="villa">Villa</option>
    <option value="appartement">Appartement</option>
    <option value="maison">Maison</option>
    <option value="studio">Studio</option>
    <option value="duplex">Duplex</option>
    <option value="terrain">Terrain</option>
  
  </select>
</div>
          <div class="search-field">
            <label for="prix">Budget</label>
            <input id="prix" type="text" placeholder="Ex: 150 000 000 FCFA">
          </div>
          <a class="search-button" href="#">Rechercher</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
